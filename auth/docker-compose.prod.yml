# Production compose for the CDCF umbrella's shared auth stack.
#
# Lives on the cdcf-website Plesk VPS at /opt/cdcf-auth/auth/.
# Brought up via the Plesk Docker extension (or `docker compose` from
# the CLI). Plesk terminates TLS upstream on
# auth.catholicdigitalcommons.org and authz.catholicdigitalcommons.org;
# container services bind to 127.0.0.1 only and are reverse-proxied by
# Plesk's nginx.
#
# Bring-up + bootstrap sequence is documented in ./README.md.
#
# DATABASE: Zitadel and OpenFGA both connect to the host's native
# PostgreSQL via the docker-bridge host-gateway. There are no
# containerized DBs in this stack — fewer moving parts, single backup
# story, same instance the host is already running for other services.
# See ./README.md "Prerequisites" for the SQL to create the roles +
# databases and the pg_hba.conf rule that allows docker-bridge access.
#
# Secrets live in /opt/cdcf-auth/auth/.env.production on the VPS
# (gitignored, mode 0600, deploy user only). NEVER commit values.

name: cdcf-auth

# `host.docker.internal` resolves to the docker-bridge host-gateway IP
# (typically 172.17.0.1) when the YAML alias below is included on each
# service. Required on Linux Docker; Docker Desktop provides it for free.
x-host-gateway: &host-gateway
  extra_hosts:
    - 'host.docker.internal:host-gateway'

services:
  # --- Zitadel (identity) ---------------------------------------------
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.12.2
    restart: unless-stopped
    <<: *host-gateway
    command: start-from-init --masterkeyFromEnv
    environment:
      # Database — points at host Postgres (see README "Prerequisites")
      ZITADEL_DATABASE_POSTGRES_HOST: host.docker.internal
      ZITADEL_DATABASE_POSTGRES_PORT: '5432'
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DB_NAME}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${ZITADEL_DB_USER}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${ZITADEL_DB_USER}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # Masterkey is 32 chars, generated once, NEVER rotated.
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY}
      # External-facing config (TLS terminated upstream by Plesk's nginx)
      ZITADEL_EXTERNALDOMAIN: auth.catholicdigitalcommons.org
      ZITADEL_EXTERNALPORT: '443'
      ZITADEL_EXTERNALSECURE: 'true'
      ZITADEL_TLS_ENABLED: 'false'
      # First-instance bootstrap: human IAM-OWNER + machine automation user with PAT.
      # PAT is written to the bind-mounted /zitadel-data/ on first boot, then reused.
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USER}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: 'true'
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: automation
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: automation
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: '2099-12-31T23:59:59Z'
      # Write the IAM_OWNER PAT to a file inside the bind-mounted data dir
      # instead of logging it to stdout. Without this, the PAT is emitted to
      # container logs during the 03_default_instance migration.
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel-data/automation-user.pat
      # Second machine user with IAM_LOGIN_CLIENT role, consumed by the
      # zitadel-login (v2 UI) container. Required for admin console login.
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Login V2 Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: '2099-12-31T23:59:59Z'
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel-data/login-client.pat
      # Enable Login V2 + point Zitadel's OIDC/SAML redirects at the public
      # /ui/v2/login path. Plesk routes this path to the zitadel-login
      # container; everything else goes to the zitadel backend.
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: 'true'
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: https://auth.catholicdigitalcommons.org/ui/v2/login
      ZITADEL_OIDC_DEFAULTLOGINURLV2: https://auth.catholicdigitalcommons.org/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: https://auth.catholicdigitalcommons.org/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: https://auth.catholicdigitalcommons.org/ui/v2/login/login?samlRequest=
    volumes:
      # Bind mount must be world-writable since the Zitadel image is scratch-based
      # and the runtime UID can't be predicted. The PAT files (automation +
      # login-client) land here on first boot.
      - /opt/cdcf-auth/runtime/zitadel-data:/zitadel-data
    # No host port mapping — reachable only via the internal docker network.
    # The zitadel-proxy service is the only public-facing entry point.
    expose:
      - '8080'

  # --- Zitadel Login V2 UI (Next.js) ---------------------------------
  # Serves /ui/v2/login/* — used by the admin console login flow.
  # Per-property end-user login UIs are still implemented in each
  # property's own frontend (calling Zitadel APIs directly); this
  # service exists for ADMIN console access only.
  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.12.2
    restart: unless-stopped
    <<: *host-gateway
    depends_on:
      zitadel:
        condition: service_started
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel-data/login-client.pat
      # Zitadel routes by Host header (multi-instance feature). Backend
      # API calls from the login container must present the public host
      # so the right instance is selected.
      CUSTOM_REQUEST_HEADERS: 'Host:auth.catholicdigitalcommons.org'
    volumes:
      # Read-only: the login service only consumes login-client.pat
      - /opt/cdcf-auth/runtime/zitadel-data:/zitadel-data:ro
    # Internal-only — fronted by zitadel-proxy.
    expose:
      - '3000'

  # --- Internal HTTP proxy in front of zitadel + zitadel-login --------
  # Plesk's nginx terminates TLS on auth.catholicdigitalcommons.org and
  # reverse-proxies the plain HTTP stream to this container. The container
  # then routes /ui/v2/login* to the v2 UI and everything else to the
  # Zitadel backend, all over the internal docker network.
  zitadel-proxy:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - zitadel
      - zitadel-login
    volumes:
      - ./nginx/zitadel.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '127.0.0.1:8080:80'

  # --- OpenFGA (relationship authz) -----------------------------------
  openfga-migrate:
    image: openfga/openfga:v1.15.1
    <<: *host-gateway
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${OPENFGA_DB_USER}:${OPENFGA_DB_PASSWORD}@host.docker.internal:5432/${OPENFGA_DB_NAME}?sslmode=disable
    restart: 'no'

  openfga:
    image: openfga/openfga:v1.15.1
    restart: unless-stopped
    <<: *host-gateway
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${OPENFGA_DB_USER}:${OPENFGA_DB_PASSWORD}@host.docker.internal:5432/${OPENFGA_DB_NAME}?sslmode=disable
      OPENFGA_AUTHN_METHOD: preshared
      OPENFGA_AUTHN_PRESHARED_KEYS: ${OPENFGA_PRESHARED_KEY}
      OPENFGA_HTTP_TLS_ENABLED: 'false'
      OPENFGA_LOG_FORMAT: json
      # Playground is OpenFGA's web UI for poking the model. Disabled
      # in prod — admin tooling lives in setup-openfga.sh and FGA CLI.
      OPENFGA_PLAYGROUND_ENABLED: 'false'
    ports:
      - '127.0.0.1:8081:8080' # HTTP API
      # Uncomment if a consumer needs gRPC:
      # - '127.0.0.1:8082:8081'
