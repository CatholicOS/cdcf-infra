# Internal proxy for the Zitadel stack — fronts both the backend and the
# v2 login UI behind a single host. Plesk's nginx terminates TLS upstream
# on auth.catholicdigitalcommons.org and reverse-proxies the plain HTTP
# stream to this container.
#
# Routing:
#   /ui/v2/login*  -> ghcr.io/zitadel/zitadel-login (v2 UI, port 3000)
#   everything else -> ghcr.io/zitadel/zitadel (backend, port 8080)
#
# Service-name resolution works because docker compose creates a default
# user-defined network; zitadel + zitadel-login are reachable by name.

upstream zitadel_backend {
    server zitadel:8080;
}

upstream zitadel_login {
    server zitadel-login:3000;
}

server {
    listen 80 default_server;
    server_name _;

    # Generous body size to accommodate uploaded org/project assets via
    # the admin console (logos, etc.).
    client_max_body_size 10m;

    # Login V2 UI — Next.js app under /ui/v2/login prefix.
    location /ui/v2/login {
        proxy_pass http://zitadel_login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection '';
    }

    # Everything else — Zitadel backend (admin console at /ui/console,
    # OIDC at /oidc/v1, OAuth at /oauth/v2, management API at
    # /management/v1, etc. See the API path prefix list in Zitadel docs.)
    location / {
        proxy_pass http://zitadel_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
